---
- name: Install and configure Datadog on Linux
  hosts: all
  gather_facts: true
  become: true
  vars_files:
    - vars/datadog.yaml
    - vars/credentials.yaml

  tasks:
    - name: Ensure gnupg is installed on RedHat
      ansible.builtin.package:
        name: gnupg
        state: present
      when: ansible_os_family == "RedHat"

    - name: Ensure apt prerequisites are installed on Debian
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Configure Datadog yum repository
      ansible.builtin.yum_repository:
        name: datadog
        description: Datadog
        baseurl: "{{ datadog_repo_baseurl }}"
        gpgcheck: true
        repo_gpgcheck: true
        gpgkey:
          - https://keys.datadoghq.com/DATADOG_RPM_KEY_CURRENT.public
          - https://keys.datadoghq.com/DATADOG_RPM_KEY_4F09D16B.public
          - https://keys.datadoghq.com/DATADOG_RPM_KEY_B01082D3.public
          - https://keys.datadoghq.com/DATADOG_RPM_KEY_FD4BF915.public
        state: present
      when: ansible_os_family == "RedHat"

    - name: Download Datadog apt signing key on Debian
      ansible.builtin.get_url:
        url: https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public
        dest: /tmp/datadog-apt-key.asc
        mode: "0644"
      when: ansible_os_family == "Debian"

    - name: Create Datadog apt keyring on Debian
      ansible.builtin.command:
        cmd: gpg --dearmor -o /usr/share/keyrings/datadog-archive-keyring.gpg /tmp/datadog-apt-key.asc
      args:
        creates: /usr/share/keyrings/datadog-archive-keyring.gpg
      when: ansible_os_family == "Debian"

    - name: Configure Datadog apt repository on Debian
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/datadog-archive-keyring.gpg] https://apt.datadoghq.com stable {{ datadog_agent_major_version }}"
        filename: datadog
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Datadog signing keys package on Debian
      ansible.builtin.apt:
        name: datadog-signing-keys
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"
      failed_when: false

    - name: Install or upgrade Datadog agent
      ansible.builtin.package:
        name: "{{ datadog_package_name }}"
        state: latest

    - name: Ensure Datadog config directory exists
      ansible.builtin.file:
        path: /etc/datadog-agent
        state: directory
        owner: dd-agent
        group: dd-agent
        mode: "0755"

    - name: Deploy datadog.yaml
      ansible.builtin.template:
        src: templates/linux_datadog.j2
        dest: /etc/datadog-agent/datadog.yaml
        owner: dd-agent
        group: dd-agent
        mode: "0640"
      no_log: true
      notify: Restart datadog-agent

    - name: Deploy system-probe.yaml
      ansible.builtin.template:
        src: templates/system_probe.j2
        dest: /etc/datadog-agent/system-probe.yaml
        owner: root
        group: dd-agent
        mode: "0640"
      notify:
        - Restart datadog-agent
        - Restart datadog-agent-sysprobe

    - name: Enable and start Datadog agent
      ansible.builtin.service:
        name: datadog-agent
        enabled: true
        state: started

    - name: Enable and start Datadog system probe
      ansible.builtin.service:
        name: datadog-agent-sysprobe
        enabled: true
        state: started
      failed_when: false

    - name: Verify Datadog agent is active
      ansible.builtin.command: systemctl is-active datadog-agent
      register: datadog_agent_status
      changed_when: false
      failed_when: datadog_agent_status.stdout | trim != "active"

    - name: Show Datadog agent status
      ansible.builtin.debug:
        msg: "datadog-agent is {{ datadog_agent_status.stdout | trim }}"

  handlers:
    - name: Restart datadog-agent
      ansible.builtin.service:
        name: datadog-agent
        state: restarted

    - name: Restart datadog-agent-sysprobe
      ansible.builtin.service:
        name: datadog-agent-sysprobe
        state: restarted
      failed_when: false